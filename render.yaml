services:
  - type: web
    name: hospital-monitor
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput
      python manage.py shell -c "from django.contrib.auth.models import User; User.objects.filter(username='admin').exists() or User.objects.create_superuser('admin','admin@atieh.ir','Admin1234')"
    startCommand: daphne -b 0.0.0.0 -p $PORT config.asgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.render_settings
      - key: SECRET_KEY
        value: x9k2mP8nqWL3vR7tzQs5jYhE4dFubK
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: hospital-db
          property: connectionString
    healthCheckPath: /accounts/login/
    autoDeploy: true

databases:
  - name: hospital-db
    databaseName: hospital_monitor
    user: hospital_user
    plan: free
